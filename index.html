<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Café Delight | Home</title>

    <!-- Google Font for modern UI -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        /* ===== GLOBAL STYLES ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #f9f9f9;
            color: #333;
        }

        /* ===== NAVBAR ===== */
        header {
            background-color: #222;
            padding: 15px 40px;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            color: #ffb703;
            font-size: 24px;
            font-weight: 600;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 25px;
        }

        nav ul li a {
            text-decoration: none;
            color: #fff;
            font-size: 16px;
            transition: color 0.3s;
        }

        nav ul li a:hover {
            color: #ffb703;
        }

        /* ===== HERO SECTION ===== */
        .hero {
            height: 85vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(
                rgba(0,0,0,0.6),
                rgba(0,0,0,0.6)
            ),
            url("https://images.unsplash.com/photo-1555396273-367ea4eb4db5") center/cover;
            color: #fff;
            padding: 20px;
        }

        .hero h1 {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .hero p {
            font-size: 18px;
            margin-bottom: 25px;
        }

        .hero button {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            background-color: #ffb703;
            color: #000;
            cursor: pointer;
            transition: background 0.3s;
        }

        .hero button:hover {
            background-color: #ffa200;
        }

        /* ===== FOOTER ===== */
        footer {
            background-color: #222;
            color: #aaa;
            text-align: center;
            padding: 15px;
            font-size: 14px;
        }

        /* ===== RESPONSIVE DESIGN ===== */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 34px;
            }

            nav ul {
                gap: 15px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== HEADER / NAVBAR ===== -->
    <header>
        <nav>
            <div class="logo">Café Delight</div>

            <!-- Navigation links for MULTI-PAGE website -->
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- ===== HERO / HOME SECTION ===== -->
    <section class="hero">
        <div>
            <h1>Welcome to Café Delight</h1>
            <p>Fresh food, cozy ambience & unforgettable taste</p>

            <!-- Button navigates to Menu page -->
            <button onclick="goToMenu()">View Menu</button>
        </div>
    </section>

    <!-- ===== FOOTER ===== -->
    <footer>
        © 2026 Café Delight. All rights reserved.
    </footer>

    <!-- ===== JAVASCRIPT ===== -->
    <script>
        // Redirect user to Menu page
        function goToMenu() {
            window.location.href = "dishesmenu.html";
        }
    </script>

</body>
</html>
